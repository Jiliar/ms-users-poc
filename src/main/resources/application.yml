spring:
  profiles:
    active: dev
  application:
    name: user-management
  graphql:
    graphiql:
      enabled: true
      path: /graphiql
    schema:
      introspection:
        enabled: true
    websocket:
      path: /graphql-ws            # Subscriptions WebSocket

  datasource:
    url: jdbc:postgresql://localhost:5432/usermanagement?currentSchema=app
    username: um_admin
    password: SecureP@ssw0rd2024!
    driver-class-name: org.postgresql.Driver
    hikari:
      schema: app
      connection-init-sql: SET search_path TO app,public

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    bizz.addonai.users.msuserspoc.services: DEBUG
    org.springframework.transaction: DEBUG
    org.springframework.web: TRACE
    org.springframework.graphql: TRACE
    bizz.addonai.users.msuserspoc.controllers: TRACE



server:
  port: 8080

# Configuración de documentación adicional
app:
  documentation:
    title: UserEntity Management API
    description: API GraphQL para gestión de usuarios con patrón Abstract Factory
    version: 1.0.0
    contact:
      name: Senior Developer
      email: dev@example.com