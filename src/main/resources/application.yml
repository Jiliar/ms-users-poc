spring:
  profiles:
    active: dev
  application:
    name: user-management
  graphql:
    graphiql:
      enabled: true
      path: /graphiql
    schema:
      introspection:
        enabled: true
    websocket:
      path: /graphql-ws

  datasource:
    url: jdbc:postgresql://localhost:5432/usermanagement?currentSchema=app
    username: um_admin
    password: SecureP@ssw0rd2024!
    driver-class-name: org.postgresql.Driver
    hikari:
      schema: app
      connection-init-sql: SET search_path TO app,public

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  cache:
    type: redis
    redis:
      time-to-live: 10m  # TTL global por defecto
      cache-null-values: false
      use-key-prefix: true
      key-prefix: "ms-users:"
  
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

logging:
  level:
    bizz.addonai.users.msuserspoc.services: DEBUG
    org.springframework.transaction: DEBUG
    org.springframework.web: TRACE
    org.springframework.graphql: TRACE
    bizz.addonai.users.msuserspoc.controllers: TRACE

server:
  port: 8080

app:
  documentation:
    title: UserEntity Management API
    description: API GraphQL para gestión de usuarios con patrón Abstract Factory
    version: 1.0.0
    contact:
      name: Jiliar Silgado
      email: jiliar.silgado@gmail.com