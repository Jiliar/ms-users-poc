spring:
  application:
    name: user-management
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/usermanagement?currentSchema=app
    username: um_admin
    password: SecureP@ssw0rd2024!
    driver-class-name: org.postgresql.Driver
    hikari:
      schema: app
      connection-init-sql: SET search_path TO app,public

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  graphql:
    graphiql:
      enabled: true
      path: /graphiql
    schema:
      locations: classpath:graphql/
      file-extensions: .graphqls, .gqls
    websocket:
      path: /graphql-ws

server:
  port: 8080

app:
  documentation:
    title: User Management API
    description: API GraphQL para gestión de usuarios
    version: 1.0.0
